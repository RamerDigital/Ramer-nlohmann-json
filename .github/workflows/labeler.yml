name: "Pull Request Labeler"

on:
  pull_request_target:
    types: [opened, synchronize]

permissions:
  contents: read

jobs:
  label:
    permissions:
      contents: read
      pull-requests: write

    runs-on: ubuntu-latest

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9ca718d3bf646d6534007c269a635b3e54cadf99 # v2.19.2
        with:
          egress-policy: audit

      - uses: srvaroa/labeler@e8fbb2561481ef6e711a770f0234e9379dc76892 # master
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
